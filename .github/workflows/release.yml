name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate version
        id: version
        run: |
          $v = python scripts/generate_version.py --print
          echo "version=$v" >> $env:GITHUB_OUTPUT
          python scripts/generate_version.py

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed `
            --name "DesktopIconOrganizer_v${{ steps.version.outputs.version }}" `
            --icon "app.ico" `
            --add-data "PingFang SC.ttf;." `
            --hidden-import customtkinter `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageDraw `
            --hidden-import PIL.ImageFont `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import win32gui `
            --hidden-import psutil `
            --hidden-import requests `
            main.py

      - name: Generate changelog
        run: |
          $current = "${{ github.ref_name }}"
          $prev = git describe --tags --abbrev=0 "$current^" 2>$null
          if ($prev) { $log = git log "$prev..$current" --pretty=format:"- %s (%h)" --no-merges }
          else { $log = git log --pretty=format:"- %s (%h)" --no-merges }
          "## $current`n`n$log" | Out-File -Encoding utf8 CHANGELOG_TEMP.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "桌面图标整理工具 ${{ github.ref_name }}"
          body_path: CHANGELOG_TEMP.md
          files: dist/DesktopIconOrganizer_v${{ steps.version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
